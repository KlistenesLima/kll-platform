# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# CLOSES all internal ports. Only Gateway, Storefront, and Admin are exposed.
# Requires .env with production credentials.

name: kll-platform

services:
  # ==================== DATABASES (ports CLOSED) ====================
  postgres:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MESSAGING (ports CLOSED) ====================
  zookeeper:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== OBSERVABILITY (ports CLOSED) ====================
  seq:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== AUTH (ports CLOSED) ====================
  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME_STRICT: "true"
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MICROSERVICES (internal ports CLOSED) ====================
  store-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pay-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      KrtBank__ApiKey: ${KRT_API_KEY}
      KrtBank__BaseUrl: ${KRT_BANK_URL:-https://api-krt.klisteneslima.dev}
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  logistics-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== EXPOSED SERVICES ====================
  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5100:5100"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notifications-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  storefront:
    ports:
      - "5174:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin-web:
    ports:
      - "5173:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
