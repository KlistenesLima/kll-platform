# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# CLOSES all internal ports. Only Gateway, Storefront, and Admin are exposed.
# Requires .env with production credentials.

name: kll-platform

services:
  # ==================== OBSERVABILITY (ports CLOSED) ====================
  seq:
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MICROSERVICES (internal ports CLOSED) ====================
  store-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Email__SmtpPassword: "${SMTP_PASSWORD:?Set SMTP_PASSWORD}"
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pay-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      KrtBank__ApiKey: ${KRT_API_KEY:?Set KRT_API_KEY}
      KrtBank__BaseUrl: "http://krt-gateway:5000"
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  logistics-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports: !reset []
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== EXPOSED SERVICES ====================
  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "5100:5100"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notifications-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  storefront:
    ports:
      - "5174:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin-web:
    ports:
      - "5173:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
