name: kll-platform

services:
  # ==================== DATABASES ====================
  postgres:
    image: postgres:16-alpine
    container_name: kll-postgres
    environment:
      POSTGRES_USER: kll
      POSTGRES_PASSWORD: Kll2025
      POSTGRES_DB: kll_store
    ports:
      - "5434:5432"
    volumes:
      - kll_pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kll -d kll_store"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kll-net

  redis:
    image: redis:7-alpine
    container_name: kll-redis
    command: redis-server --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - kll_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kll-net

  mongodb:
    image: mongo:7
    container_name: kll-mongodb
    ports:
      - "27018:27017"
    volumes:
      - kll_mongo_data:/data/db
    networks:
      - kll-net

  # ==================== MESSAGING ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kll-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "42181:2181"
    networks:
      - kll-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kll-kafka
    depends_on:
      - zookeeper
    ports:
      - "39092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:39092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - kll-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kll-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: kll
      RABBITMQ_DEFAULT_PASS: kll123
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - kll-net

  # ==================== OBSERVABILITY ====================
  seq:
    image: datalust/seq:latest
    container_name: kll-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5342:5341"
      - "8082:80"
    volumes:
      - kll_seq_data:/data
    networks:
      - kll-net

volumes:
  kll_pgdata:
  kll_redis_data:
  kll_mongo_data:
  kll_seq_data:

networks:
  kll-net:
    driver: bridge