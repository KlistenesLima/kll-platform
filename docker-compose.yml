name: kll-platform

networks:
  kll-krt-network:
    external: true

services:
  # ==================== OBSERVABILITY ====================
  seq:
    image: datalust/seq:latest
    container_name: kll-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:?Set SEQ_ADMIN_PASSWORD in .env}
    ports:
      - "5342:5341"
      - "8082:80"
    volumes:
      - kll_seq_data:/data
    networks:
      - kll-krt-network

  # ==================== MICROSERVICES ====================
  store-api:
    build:
      context: .
      dockerfile: src/Services/KLL.Store/KLL.Store.Api/Dockerfile
    container_name: kll-store-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      Email__SmtpPassword: "${SMTP_PASSWORD:?Set SMTP_PASSWORD in .env}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS:?Set EMAIL_FROM_ADDRESS in .env}"
      ConnectionStrings__DefaultConnection: "Host=shared-postgres;Port=5432;Database=kll_store;Username=kll;Password=kll"
      Redis__Configuration: "shared-redis:6379,defaultDatabase=1"
      Kafka__BootstrapServers: "shared-kafka:9092"
      RabbitMq__Host: "shared-rabbitmq"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      Keycloak__Authority: "http://shared-keycloak:8080/realms/kll-platform"
      Keycloak__ValidIssuer: "http://shared-keycloak:8080/realms/kll-platform"
      Serilog__WriteTo__1__Args__serverUrl: "http://kll-seq:5341"
    ports:
      - "5200:5200"
    volumes:
      - ./src/Web/kll-storefront/public/products:/app/products-local
    networks:
      - kll-krt-network

  pay-api:
    build:
      context: .
      dockerfile: src/Services/KLL.Pay/KLL.Pay.Api/Dockerfile
    container_name: kll-pay-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      KrtBank__ApiKey: ${KRT_API_KEY:?Set KRT_API_KEY in .env}
      KrtBank__BaseUrl: "http://krt-gateway:80"
      ConnectionStrings__DefaultConnection: "Host=shared-postgres;Port=5432;Database=kll_pay;Username=kll;Password=kll"
      Redis__Configuration: "shared-redis:6379,defaultDatabase=1"
      Kafka__BootstrapServers: "shared-kafka:9092"
      RabbitMq__Host: "shared-rabbitmq"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      Serilog__WriteTo__1__Args__serverUrl: "http://kll-seq:5341"
    ports:
      - "5300:5300"
    networks:
      - kll-krt-network

  logistics-api:
    build:
      context: .
      dockerfile: src/Services/KLL.Logistics/KLL.Logistics.Api/Dockerfile
    container_name: kll-logistics-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ConnectionStrings__DefaultConnection: "Host=shared-postgres;Port=5432;Database=kll_logistics;Username=kll;Password=kll"
      Redis__Configuration: "shared-redis:6379,defaultDatabase=1"
      Kafka__BootstrapServers: "shared-kafka:9092"
      RabbitMq__Host: "shared-rabbitmq"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      Serilog__WriteTo__1__Args__serverUrl: "http://kll-seq:5341"
    ports:
      - "5400:5400"
    networks:
      - kll-krt-network

  gateway:
    build:
      context: .
      dockerfile: src/Services/KLL.Gateway/Dockerfile
    container_name: kll-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
    ports:
      - "5100:5100"
    depends_on:
      - store-api
      - pay-api
      - logistics-api
    networks:
      - kll-krt-network

  notifications-worker:
    build:
      context: .
      dockerfile: src/Services/KLL.Notifications/KLL.Notifications.Worker/Dockerfile
    container_name: kll-notifications
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      RabbitMq__Host: "shared-rabbitmq"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
    networks:
      - kll-krt-network

  storefront:
    build:
      context: src/Web/kll-storefront
      dockerfile: Dockerfile
    container_name: kll-storefront
    ports:
      - "5174:80"
    depends_on:
      - gateway
    networks:
      - kll-krt-network

  admin-web:
    build:
      context: src/Web/kll-admin-web
      dockerfile: Dockerfile
    container_name: kll-admin-web
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - kll-krt-network

volumes:
  kll_seq_data:
