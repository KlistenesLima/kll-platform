name: KLL Platform CI/CD

on:
  push:
    branches: [main, dev, homolog]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore KLL.Platform.sln

      - name: Build
        run: dotnet build KLL.Platform.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test KLL.Platform.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Admin Web
        working-directory: src/Web/kll-admin-web
        run: |
          npm ci
          npm run build

      - name: Build Storefront
        working-directory: src/Web/kll-storefront
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/homolog'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker compose build --parallel

      - name: Run Smoke Test
        run: |
          docker compose up -d postgres redis
          sleep 10
          docker compose up -d store-api pay-api logistics-api gateway
          sleep 15
          curl -f http://localhost:5100/health/store || exit 1
          docker compose down
